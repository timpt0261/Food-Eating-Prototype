  buildForAllSupportedPlatforms:
    # needs: testRunner
    name: Build for ${{ github.event.inputs.build-type}}
    runs-on: ubuntu-latest
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     targetPlatform:
    #       - StandaloneWindows # Build a Windows standalone.
    #       - WebGL # WebGL.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{github.event.inputs.build-type }}
          restore-keys: Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{github.event.inputs.build-type }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{github.event.inputs.build-type }}
          path: build/${{github.event.inputs.build-type }}

  deployWebToItchIO:
    needs: buildForAllSupportedPlatforms
    name: Upload to Itch.io
    runs-on: ubuntu-latest
    steps:
      - name: Down Load Web Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build${{github.event.inputs.build-type }}
          path: build/${{github.event.inputs.build-type }}
                
      - name: Deploy to Itch.io
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.ITCHIO_API_KEY}}
          gameData: ./build/WebGL
          itchUsername: ${{github.event.inputs.itch-username}}
          itchGameId: ${{ github.event.inputs.itch-game-id }}
          buildChannel: ${{github.event.inputs.build-type }}
          buildNumber: ${{ needs.version.outputs.version_hash }}
        