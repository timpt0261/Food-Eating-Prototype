name: Build Unity Project & Deploy on ItchIo

on:
  workflow_dispatch:
    inputs:
      itch-username:
        description: "Itch.io UserName(https://[username].itch.io/)"
        required: true
        type: string

      itch-game-id:
        description: "id of the game( e.g. username.itch.io/game-name, game-name)"
        required: true
        type: string

      # build-type:
      #   description: "Game Build Type"
      #   required: true
      #   type: choice
      #   options:
      #     - webgl
      #     - windows

jobs:
  testRunner:
    name: Test in ${{ matrix.testMode }} ✨
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      - name: Restore Library cache
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: |
            Library-

      - name: Run tests
        id: test-runner
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: ${{matrix.testMode}}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results (${{ matrix.testMode }})
          path: ${{ steps.testRunner.outputs.artifactsPath }}

  buildForAllSupportedPlatforms:
    # needs: testRunner
    name: Build for WebGL
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-WebGl
          restore-keys: Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-WebGL
          path: build/WebGL

  deployWebToItchIO:
    needs: buildForAllSupportedPlatforms
    name: Deploy to Itch.io Website
    runs-on: ubuntu-latest

    steps:
      - name: Down Load Web Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build-WebGL
          path: build/WebGL

      - name: Deploy to Itch.io
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.ITCHIO_API_KEY}}
          gameData: ./build/WebGL
          itchUsername: ${{github.event.inputs.itch-username}}
          itchGameId: ${{ github.event.inputs.itch-game-id }}
          buildChannel: webgl
          buildNumber: ${{ needs.version.outputs.version_hash }}
