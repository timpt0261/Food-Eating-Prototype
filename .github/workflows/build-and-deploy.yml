name: Build Unity Project & Deploy on ItchIo

on:
  workflow_dispatch:
    inputs:
      itch-username:
        description: "Itch.io UserName(https://[username].itch.io/)"
        required: true
        type: string

      itch-game-id: 
        description: "id of the game( e.g. username.itch.io/game-name, game-name)"
        required: true
        type: string

      unity-version:
        description: "version of unity"
        required: false
        type: string
        default: ""

jobs:
  testRunner:
    name: Test in ${{ matrix.testMode }} ✨
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      - name: Restore Library cache
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: |
            Library-

      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GH_TOKEN }}
          testMode: ${{matrix.testMode}}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          unityVersion: ${{ github.event.inputs.unity-version }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results (${{ matrix.testMode }})
          path: ${{ steps.testRunner.outputs.artifactsPath }}

  buildForWebGL:
    # needs: testRunner
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-WebGL
          restore-keys: Library-

      - name: Get Unity Version for Build
        id: unity-version
        run: |
          if [ -n "${{ github.event.inputs.unity-version }}" ]; then
            echo "version=${{ github.event.inputs.unity-version }}" >> $GITHUB_OUTPUT
          else
            # If no version specified, you can either:
            # Option 1: Use a default version
            echo "version=2022.3.10f1" >> $GITHUB_OUTPUT
            # Option 2: Or leave empty to use project's default
            # echo "version=" >> $GITHUB_OUTPUT
          fi

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: ${{ steps.unity-version.outputs.version }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-WebGL
          path: build/WebGL

  deployWebToItchIO:
    needs: buildForWebGL
    name: Upload to Itch.io
    runs-on: ubuntu-latest
    
    steps:
      - name: Down Load Web Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build-WebGL
          path: build/WebGL
                
      - name: Deploy to Itch.io
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{secrets.ITCHIO_API_KEY}}
          gameData: ./build/WebGL
          itchUsername: ${{github.event.inputs.itch-username}}
          itchGameId: ${{ github.event.inputs.itch-game-id }}
          buildChannel: webgl
          buildNumber: ${{ github.sha }}