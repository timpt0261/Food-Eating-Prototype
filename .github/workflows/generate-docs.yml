name: Generate Documentation

on: 
  workflow_dispatch:
    inputs:
      version: 
        description: 'Documentation Version (optional)'
        required: false
        default: 'latest'

permissions: 
  contents: write
  pages: write
  id-token: write

jobs:
  generate-docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install Doxygen & Dependencies
        run: | 
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      
      - name: Create Output Directory
        run: |
          # Create the Docs/HTML directory (parent directories will be created if needed)
          mkdir -p Docs/HTML
          echo "Created directory: Docs/HTML"
      
      - name: Generate Doxygen Documentation
        run: | 
          # Run doxygen with your Doxyfile
          # Make sure your Doxyfile has OUTPUT_DIRECTORY = ./Docs/HTML
          doxygen Doxyfile
          
          # Verify the output was created
          if [ -d "Docs/HTML" ] && [ "$(ls -A Docs/HTML)" ]; then
            echo "✅ Documentation generated successfully in Docs/HTML"
          else
            echo "❌ Documentation generation failed - output directory is empty"
            exit 1
          fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.9.3
        if: github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Docs/HTML  # Changed from ./public to ./Docs/HTML
          publish_branch: gh-pages   # Standard GitHub Pages branch
          enable_jekyll: true
          force_orphan: true

      - name: Create Summary
        if: always()
        run: |
          echo "## 📚 Documentation Generated" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Generated at:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Output Path:** \`Docs/HTML\`" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Documentation](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY